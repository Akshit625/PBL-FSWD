<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | RoomRadar</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-layout">
      <section class="auth-side">
        <a class="brand" href="/">
          <span class="brand-mark">RR</span>
          <span>
            <strong>RoomRadar</strong>
            <small>Back to search</small>
          </span>
        </a>

        <div class="auth-copy">
          <p class="eyebrow">Join RoomRadar</p>
          <h1>Create your account.</h1>
          <p>Students can discover nearby rooms, and owners can post and manage listings.</p>
        </div>
      </section>

      <section class="auth-card-shell">
        <form id="signupForm" class="auth-card stack-form" method="post" action="/signup" novalidate>
          <div>
            <h2>Create account</h2>
            <p>Choose the role that matches how you will use RoomRadar.</p>
          </div>

          <label>
            <span>Full name</span>
            <input name="name" type="text" required />
          </label>

          <label>
            <span>Email</span>
            <input
              name="email"
              type="email"
              required
              autocomplete="email"
            />
          </label>

          <div class="split-inputs">
            <label>
              <span>Password</span>
              <input name="password" type="password" required minlength="6" />
            </label>
            <label>
              <span>Phone</span>
              <input
                name="phone"
                type="tel"
                required
                inputmode="numeric"
                autocomplete="tel"
                maxlength="20"
              />
            </label>
          </div>

          <label>
            <span>Role</span>
            <select name="role" required>
              <option value="student">Student</option>
              <option value="owner">Property owner</option>
            </select>
          </label>

          <button class="button button-primary button-full" type="submit">Create account</button>
          <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
        </form>
      </section>
    </main>

    <div id="appToast" class="toast hidden"></div>
    <script type="module" src="/assets/js/auth-pages.js"></script>
  </body>
</html>
